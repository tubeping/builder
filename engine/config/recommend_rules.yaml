# 쇼핑성 필터 (True일 때 is_shopping != "O" 이거나 CTR 낮은 것 제외)
shopping_only:
  enabled: true
  min_ctr: 0.3          # CTR 0.3% 미만 제외
  require_shopping: false  # is_shopping 필드 == "O" 강제할지
  min_clicks: 50          # 월간 클릭 50회 미만 제외

# 블랙리스트 카테고리 (naver_categories.yaml의 auto_mapping에서 제외)
blacklist_categories:
  - 도서
  - 면세점
  - 여가/생활편의

